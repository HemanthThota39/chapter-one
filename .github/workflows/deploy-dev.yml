name: Deploy to dev
on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  RG: co-dev-rg-cin

jobs:
  build-backend:
    name: Build + push backend image
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Resolve ACR name
        id: acr
        run: |
          ACR=$(az acr list -g "$RG" --query '[0].name' -o tsv)
          echo "name=$ACR" >> "$GITHUB_OUTPUT"
      - name: az acr build
        run: |
          az acr build \
            --registry ${{ steps.acr.outputs.name }} \
            --image "backend:${{ steps.tag.outputs.tag }}" \
            --image "backend:latest" \
            --file backend/Dockerfile \
            backend/

      - name: Run DB migrations
        # Alembic migrations live in the backend image; run them after the
        # new image is built so schema matches what the app will serve.
        # Using a separate job resource so schema drift surfaces via its
        # Succeeded/Failed status. Job config is managed out-of-band.
        run: |
          az containerapp job start -n co-dev-job-migrate -g "$RG" -o tsv --query name
          # Poll until the just-started execution finishes (Alembic typically ≤ 30s).
          # Find the newest execution started in the last 5 minutes.
          for i in $(seq 1 60); do
            sleep 10
            RESULT=$(az containerapp job execution list -n co-dev-job-migrate -g "$RG" \
              --query "[0].{name:name,status:properties.status}" -o tsv)
            STATUS=$(echo "$RESULT" | awk '{print $2}')
            echo "migrate status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ]; then
              echo "::error::DB migration failed"
              exit 1
            fi
          done
          echo "::error::DB migration timed out"
          exit 1

  deploy-infra:
    name: Bicep deploy (dev)
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve ACR login server
        id: acr
        run: |
          ACR_FQDN=$(az acr list -g "$RG" --query '[0].loginServer' -o tsv)
          echo "login_server=$ACR_FQDN" >> "$GITHUB_OUTPUT"
      - name: Deploy
        run: |
          az deployment group create \
            -g "$RG" \
            -f infra/main.bicep \
            -p @infra/envs/dev.parameters.json \
            -p aiFoundryApiKey="${{ secrets.AZURE_OPENAI_API_KEY_DEV }}" \
            -p postgresAdminPassword="${{ secrets.AZURE_PG_ADMIN_PASSWORD_DEV }}" \
            -p sessionEncryptionKey="${{ secrets.AZURE_SESSION_KEY_DEV }}" \
            -p backendImage="${{ steps.acr.outputs.login_server }}/backend:${{ needs.build-backend.outputs.image_tag }}" \
            -p targetPort=8000 \
            -p healthPath="/health" \
            --name "deploy-$(date +%Y%m%d-%H%M%S)"

  # Frontend SWA deploy lands in M1 when the Static Web App resource is provisioned.
  # See docs/phase2/09-roadmap.md §M1.
