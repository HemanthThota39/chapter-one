name: Deploy frontend to dev SWA
on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/deploy-frontend-dev.yml']

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install + build
        working-directory: frontend
        env:
          # Empty → frontend uses same-origin relative URLs. Same-origin /api/*
          # calls get auto-proxied by the SWA's linkedBackend to the Container
          # App, so the browser never makes cross-origin requests. This is the
          # permanent fix for the third-party-cookie login failures (Safari
          # ITP, Brave, strict Chrome mode, iOS Safari).
          NEXT_PUBLIC_API_BASE_URL: ""
        run: |
          npm ci || npm install
          npm run build

      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: .next
          skip_app_build: true
