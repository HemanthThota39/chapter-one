name: Infra Validate
on:
  pull_request:
    paths: ['infra/**', '.github/workflows/infra-validate.yml']

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  whatif:
    name: Bicep what-if (dev)
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Bicep what-if
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          az deployment group what-if \
            -g co-dev-rg-cin \
            -f infra/main.bicep \
            -p @infra/envs/dev.parameters.json \
            -p aiFoundryApiKey="${{ secrets.AZURE_OPENAI_API_KEY_DEV }}" \
            --no-pretty-print 2>&1 | tee whatif.txt
      - name: Comment whatif on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = "### Bicep what-if (dev)\n\n```\n" +
              fs.readFileSync('whatif.txt', 'utf8').slice(0, 60000) +
              "\n```";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
