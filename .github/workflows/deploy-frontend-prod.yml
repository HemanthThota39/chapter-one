name: Deploy frontend to prod SWA
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install + build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://co-prod-api-cin.gentlewater-2e8d231c.centralindia.azurecontainerapps.io
        run: |
          npm ci || npm install
          npm run build
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: .next
          skip_app_build: true
